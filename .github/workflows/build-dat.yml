name: Build .dat files

on:
  push:
    paths:
      - "geoip_list.txt"
      - "geosite_list.txt"
      - "edits/geoip_list.txt"
      - "edits/geosite_list.txt"
      - "geo_tool.ps1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .dat from lists
        shell: pwsh
        run: ./geo_tool.ps1 import

      - name: Commit updated .dat files (if any)
        shell: bash
        run: |
          files=()
          if [ -f complete/geoip.dat ]; then files+=("complete/geoip.dat"); fi
          if [ -f complete/geosite.dat ]; then files+=("complete/geosite.dat"); fi
          if [ -f geoip.dat ]; then files+=("geoip.dat"); fi
          if [ -f geosite.dat ]; then files+=("geosite.dat"); fi
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .dat files found to commit"
            exit 0
          fi
          if git diff --quiet -- "${files[@]}"; then
            echo "No .dat changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "ci: update dat files"
          git push
